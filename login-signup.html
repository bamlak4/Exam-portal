<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>
<link rel="stylesheet" href="work2.css">
<style>
  body {
    background:var(--body-bg);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
.container {
    background: var(--container-color);
    padding: 30px 40px;
    width: 380px;
    border-radius: 12px;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
  }

  h2 {
    margin: 0 0 20px;
    font-size: 26px;
    text-align: center;
    color: #333;
  }

  label {
    font-weight: bold;
    display: block;
    margin: 12px 0 6px;
  }
  
  <!--person c-->
  input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #bbb;
    border-radius: 6px;
    font-size: 16px;
  }

  .role-box {
    margin: 15px 0;
  }

  .btn {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #4a4949;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn:hover {
    background: #000;
  }
</style>
</head>
