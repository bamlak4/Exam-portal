<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step-by-Step Quiz</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <form id="quizForm">
      
      <div id="timer"></div>
      <!-- Question container -->
      <div id="questionBox">
        <h2>Question 1</h2>
        <p>A cylindrical water tank has a radius of 3 m and height of 7 m. What is its volume?</p>
        <div class="options">
        `   <label>
              <input type="radio" name="q1" value="198">
              198 m³
            </label>
            <label>
              <input type="radio" name="q1" value="197">
              197 m³
            </label>
            <label>
              <input type="radio" name="q1" value="200">
              200 m³
            </label>
            <label>
              <input type="radio" name="q1" value="210">
              210 m³
            </label>
          `
        </div>
      </div>
      <!-- Navigation buttons -->
      <div class="btns">
        <button type="button" id="ultraprevBtn" class="btn ultbtn">|&lt;</button>
        <button type="button" id="prevBtn" class="btn btn-secondary">Back</button>
        <button type="button" id="nextBtn" class="btn btn-primary">Next</button>
        <button type="button" id="ultranextBtn" class="btn ultbtn">&gt;|</button>
      </div>
    </form>

    <div id="result" class="result"></div>
  </div>

</body>
</html>
